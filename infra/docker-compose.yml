services:
  db:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: competition-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5436}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
