version: 4


algorithms:
  reverse_edge_multiplier: 1.6     # штраф для синтетического обратного FK-направления
  hub_score_step_cost: 0.12        # шаг штрафа за удаленность от центра (hub_score)

  cardinality_costs:
    one_to_one: 0.0
    many_to_one: 0.05              # переход к словарю
    one_to_many: 0.10              # переход к многим

# ---------------------------------------------------------------------------
# Tables — только структурные метаданные графа.
# Для каждой таблицы: hub_score (1=центр), pk, направленные FK-ребра.
# hub_score >= 5 = листовой узел (без FK-расширения).
# ---------------------------------------------------------------------------
tables:

  user:
    hub_score: 2
    pk: user_id

    edges:
      - to: competition
        from_col: user_id
        to_col: organizer_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: participation
        from_col: user_id
        to_col: user_id
        cardinality: one_to_many
        join_preference: JOIN


  task_type:
    hub_score: 2
    pk: task_type_id

    edges:
      - to: metric
        from_col: task_type_id
        to_col: task_type_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: competition
        from_col: task_type_id
        to_col: task_type_id
        cardinality: one_to_many
        join_preference: JOIN


  metric:
    hub_score: 3
    pk: metric_id

    edges:
      - to: task_type
        from_col: task_type_id
        to_col: task_type_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: configuration
        from_col: metric_id
        to_col: metric_id
        cardinality: one_to_many
        join_preference: JOIN


  competition:
    hub_score: 1
    pk: competition_id

    edges:
      - to: user
        from_col: organizer_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: configuration
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_one
        join_preference: JOIN

      - to: participation
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: team
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: competition_dataset
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN


  configuration:
    hub_score: 3
    pk: configuration_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: metric
        from_col: metric_id
        to_col: metric_id
        cardinality: many_to_one
        join_preference: JOIN


  participation:
    hub_score: 1
    pk: participation_id

    edges:
      - to: user
        from_col: user_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: submission
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_many
        join_preference: JOIN


  dataset:
    hub_score: 3
    pk: dataset_id

    edges:
      - to: dataset_file
        from_col: dataset_id
        to_col: dataset_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: competition_dataset
        from_col: dataset_id
        to_col: dataset_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: team_competition
        from_col: dataset_id
        to_col: dataset_id
        cardinality: one_to_many
        join_preference: JOIN


  dataset_file:
    hub_score: 5
    pk: file_id

    edges:
      - to: dataset
        from_col: dataset_id
        to_col: dataset_id
        cardinality: many_to_one
        join_preference: JOIN


  submission:
    hub_score: 2
    pk: submission_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN


  team:
    hub_score: 3
    pk: team_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: team_member
        from_col: team_id
        to_col: team_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: team_competition
        from_col: team_id
        to_col: team_id
        cardinality: one_to_many
        join_preference: JOIN


  team_member:
    hub_score: 5
    pk: member_id

    edges:
      - to: team
        from_col: team_id
        to_col: team_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: user
        from_col: user_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: team_role
        from_col: team_role_id
        to_col: team_role_id
        cardinality: many_to_one
        join_preference: JOIN


  competition_dataset:
    hub_score: 5
    pk: competition_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: dataset
        from_col: dataset_id
        to_col: dataset_id
        cardinality: many_to_one
        join_preference: JOIN


  team_competition:
    hub_score: 5
    pk: team_id

    edges:
      - to: team
        from_col: team_id
        to_col: team_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: dataset
        from_col: dataset_id
        to_col: dataset_id
        cardinality: many_to_one
        join_preference: JOIN


  role:
    hub_score: 5
    pk: role_id

    edges: []


  dataset_purpose:
    hub_score: 5
    pk: purpose_id

    edges: []


  team_role:
    hub_score: 5
    pk: team_role_id

    edges: []


  competition_status:
    hub_score: 5
    pk: status_id

    edges: []


  team_status:
    hub_score: 5
    pk: status_id

    edges: []


  participation_status:
    hub_score: 5
    pk: status_id

    edges: []


  submission_status:
    hub_score: 5
    pk: status_id

    edges: []
