version: 4


algorithms:
  reverse_edge_multiplier: 1.6     # штраф для синтетического обратного FK-направления
  hub_score_step_cost: 0.12        # шаг штрафа за удаленность от центра (hub_score)

  cardinality_costs:
    one_to_one: 0.0
    many_to_one: 0.05              # переход к словарю
    one_to_many: 0.10              # переход к многим

# ---------------------------------------------------------------------------
# Tables — только структурные метаданные графа.
# Для каждой таблицы: hub_score (1=центр), pk, направленные FK-ребра.
# hub_score >= 5 = листовой узел (без FK-расширения).
# ---------------------------------------------------------------------------
tables:

  user:
    hub_score: 2
    pk: user_id

    edges:
      - to: competition
        from_col: user_id
        to_col: organizer_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: participation
        from_col: user_id
        to_col: user_id
        cardinality: one_to_many
        join_preference: JOIN


  task_type:
    hub_score: 2
    pk: task_type_id

    edges:
      - to: metric
        from_col: task_type_id
        to_col: task_type_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: competition
        from_col: task_type_id
        to_col: task_type_id
        cardinality: one_to_many
        join_preference: JOIN


  metric:
    hub_score: 3
    pk: metric_id

    edges:
      - to: task_type
        from_col: task_type_id
        to_col: task_type_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition_config
        from_col: metric_id
        to_col: metric_id
        cardinality: one_to_many
        join_preference: JOIN


  competition:
    hub_score: 1
    pk: competition_id

    edges:
      - to: user
        from_col: organizer_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: task_type
        from_col: task_type_id
        to_col: task_type_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition_config
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_one
        join_preference: JOIN

      - to: prize
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: LEFT JOIN

      - to: participation
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: dataset
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN


  competition_config:
    hub_score: 3
    pk: config_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: metric
        from_col: metric_id
        to_col: metric_id
        cardinality: many_to_one
        join_preference: JOIN


  prize:
    hub_score: 5
    pk: prize_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN


  participation:
    hub_score: 1
    pk: participation_id

    edges:
      - to: user
        from_col: user_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: submission
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: leaderboard_row
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_one
        join_preference: LEFT JOIN

      - to: code_kernel
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_many
        join_preference: LEFT JOIN


  dataset:
    hub_score: 3
    pk: dataset_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: file_artifact
        from_col: dataset_id
        to_col: dataset_id
        cardinality: one_to_many
        join_preference: JOIN


  file_artifact:
    hub_score: 5
    pk: file_id

    edges:
      - to: dataset
        from_col: dataset_id
        to_col: dataset_id
        cardinality: many_to_one
        join_preference: JOIN


  submission:
    hub_score: 2
    pk: submission_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: evaluation
        from_col: submission_id
        to_col: submission_id
        cardinality: one_to_one
        join_preference: LEFT JOIN


  evaluation:
    hub_score: 3
    pk: evaluation_id

    edges:
      - to: submission
        from_col: submission_id
        to_col: submission_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: leaderboard_row
        from_col: evaluation_id
        to_col: best_evaluation_id
        cardinality: one_to_one
        join_preference: LEFT JOIN


  leaderboard_row:
    hub_score: 3
    pk: participation_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: evaluation
        from_col: best_evaluation_id
        to_col: evaluation_id
        cardinality: many_to_one
        join_preference: JOIN


  code_kernel:
    hub_score: 5
    pk: kernel_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN


  role:
    hub_score: 5
    pk: role_id

    edges: []


  dataset_purpose:
    hub_score: 5
    pk: purpose_id

    edges: []


  team_role:
    hub_score: 5
    pk: team_role_id

    edges: []


  competition_status:
    hub_score: 5
    pk: status_id

    edges: []


  team_status:
    hub_score: 5
    pk: status_id

    edges: []


  participation_status:
    hub_score: 5
    pk: status_id

    edges: []


  submission_status:
    hub_score: 5
    pk: status_id

    edges: []
