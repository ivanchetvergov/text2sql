    context_text: "dataset_purpose(purpose_id SERIAL PK, name VARCHAR(15) UNIQUE, description TEXT)"

    columns:
      purpose_id:
        retrieval_text: уникальный идентификатор назначения датасета, первичный ключ
      name:
        retrieval_text: краткое имя назначения датасета
      description:
        retrieval_text: текстовое описание назначения датасета

    examples:
      - query: Какие типы назначения датасетов поддерживаются
        answer: >
          SELECT dp.purpose_id, dp.name, dp.description
          FROM dataset_purpose dp
          ORDER BY dp.name;


  team_role:
