version: 2

tables:

  user:
    retrieval_text: >
      Пользователи платформы: участники, организаторы соревнований, администраторы.
      Хранит профиль пользователя: имя, email, дата регистрации.
      Организатор соревнования связан через competition.organizer_id.
      Участие в соревновании — через таблицу participation по user_id.
      Запросы: кто участвовал, кто организовал, активные пользователи,
      зарегистрированные в период, топ по отправкам.

    context_text: "user(user_id BIGINT PK, role_id BIGINT FK→role, username VARCHAR, email VARCHAR, password_hash VARCHAR, registered_at TIMESTAMP)"

    columns:
      user_id:
        retrieval_text: уникальный идентификатор пользователя, первичный ключ
      role_id:
        retrieval_text: FK на role.role_id
      username:
        retrieval_text: имя пользователя, логин, никнейм
      email:
        retrieval_text: электронная почта пользователя
      password_hash:
        retrieval_text: хеш пароля
      registered_at:
        retrieval_text: дата и время регистрации

    examples:
      - query: Сколько пользователей зарегистрировано
        answer: >
          SELECT COUNT(*) AS user_count
          FROM "user";

      - query: Организаторы соревнований с числом соревнований
        answer: >
          SELECT u.user_id, u.username, COUNT(c.competition_id) AS competitions_count
          FROM "user" u
          JOIN competition c ON u.user_id = c.organizer_id
          GROUP BY u.user_id, u.username
          ORDER BY competitions_count DESC;

  role:
    retrieval_text: >
      Справочник ролей пользователей платформы.
      Используется для управления правами и сегментации пользователей.

    context_text: "role(role_id SERIAL PK, name VARCHAR(30) UNIQUE, description TEXT)"

    columns:
      role_id:
        retrieval_text: уникальный идентификатор роли, первичный ключ
      name:
        retrieval_text: короткое имя роли
      description:
        retrieval_text: текстовое описание роли

    examples:
      - query: Список ролей
        answer: >
          SELECT role_id, name, description
          FROM role
          ORDER BY role_id;

  task_type:
    retrieval_text: >
      Справочник типов задач машинного обучения: classification, regression,
      ranking, detection, nlp, clustering.
      Связан с соревнованием через configuration.task_type_id.

    context_text: "task_type(task_type_id BIGINT PK, code VARCHAR, description TEXT, answer_format VARCHAR, validation_schema JSON, created_at TIMESTAMP)"

    columns:
      task_type_id:
        retrieval_text: уникальный идентификатор типа задачи
      code:
        retrieval_text: код типа задачи
      description:
        retrieval_text: описание типа задачи
      answer_format:
        retrieval_text: допустимый формат ответа
      validation_schema:
        retrieval_text: схема валидации ответа
      created_at:
        retrieval_text: время создания

    examples:
      - query: Типы задач используемые в конфигурациях соревнований
        answer: >
          SELECT tt.code, COUNT(cfg.configuration_id) AS used_in_competitions
          FROM task_type tt
          LEFT JOIN configuration cfg ON cfg.task_type_id = tt.task_type_id
          GROUP BY tt.code
          ORDER BY used_in_competitions DESC;

  metric:
    retrieval_text: >
      Метрики оценки качества ML-моделей: accuracy, f1, rmse, auc и др.
      Используются в соревнованиях через configuration.metric_id.
      Каждая метрика имеет направление оптимизации (max/min).

    context_text: "metric(metric_id BIGINT PK, name VARCHAR, formula TEXT, optimization_dir VARCHAR(3), description TEXT, created_at TIMESTAMP)"

    columns:
      metric_id:
        retrieval_text: уникальный идентификатор метрики
      name:
        retrieval_text: имя метрики
      formula:
        retrieval_text: формула вычисления метрики
      optimization_dir:
        retrieval_text: направление оптимизации max/min
      description:
        retrieval_text: пояснение по метрике
      created_at:
        retrieval_text: дата создания записи метрики

    examples:
      - query: Метрики с направлением оптимизации max
        answer: >
          SELECT metric_id, name
          FROM metric
          WHERE optimization_dir = 'max'
          ORDER BY metric_id;

      - query: Средний лучший score по метрикам
        answer: >
          SELECT m.name, AVG(p.best_score) AS avg_best_score
          FROM metric m
          JOIN configuration cfg ON cfg.metric_id = m.metric_id
          JOIN participation p ON p.competition_id = cfg.competition_id
          WHERE p.best_score IS NOT NULL
          GROUP BY m.name
          ORDER BY avg_best_score DESC;

  competition_status:
    retrieval_text: >
      Справочник статусов соревнований: draft, active, finished и т.д.

    context_text: "competition_status(status_id SERIAL PK, name VARCHAR(15) UNIQUE, description TEXT)"

    columns:
      status_id:
        retrieval_text: идентификатор статуса соревнования
      name:
        retrieval_text: код статуса
      description:
        retrieval_text: описание статуса

    examples:
      - query: Доступные статусы соревнований
        answer: >
          SELECT status_id, name, description
          FROM competition_status
          ORDER BY status_id;

  competition:
    retrieval_text: >
      Соревнования по машинному обучению — основная бизнес-сущность платформы.
      Хранит название, статус, даты начала/конца, организатора.
      Связана с participation, configuration, team и competition_dataset.

    context_text: "competition(competition_id BIGINT PK, organizer_id BIGINT FK→user, status_id BIGINT FK→competition_status, title VARCHAR(50), description TEXT, starts_at TIMESTAMP, ends_at TIMESTAMP)"

    columns:
      competition_id:
        retrieval_text: уникальный идентификатор соревнования
      organizer_id:
        retrieval_text: FK на пользователя-организатора
      status_id:
        retrieval_text: FK на competition_status
      title:
        retrieval_text: название соревнования
      description:
        retrieval_text: текстовое описание соревнования
      starts_at:
        retrieval_text: время начала соревнования
      ends_at:
        retrieval_text: время окончания соревнования

    examples:
      - query: Активные соревнования с числом участников
        answer: >
          SELECT c.competition_id, c.title, COUNT(p.participation_id) AS participants_count
          FROM competition c
          LEFT JOIN participation p ON p.competition_id = c.competition_id
          WHERE c.status_id = (SELECT status_id FROM competition_status WHERE name = 'active')
          GROUP BY c.competition_id, c.title
          ORDER BY participants_count DESC;

      - query: Соревнования завершенные в текущем году
        answer: >
          SELECT competition_id, title, ends_at
          FROM competition
          WHERE status_id = (SELECT status_id FROM competition_status WHERE name = 'finished')
            AND EXTRACT(YEAR FROM ends_at) = EXTRACT(YEAR FROM NOW())
          ORDER BY ends_at DESC;

  configuration:
    retrieval_text: >
      Конфигурация соревнования: метрика, тип задачи и лимит отправок в день.
      Это актуальная таблица конфигурации соревнования.

    context_text: "configuration(configuration_id BIGINT PK, competition_id BIGINT FK→competition, metric_id BIGINT FK→metric, task_type_id BIGINT FK→task_type, daily_attempt_limit SMALLINT)"

    columns:
      configuration_id:
        retrieval_text: уникальный идентификатор конфигурации
      competition_id:
        retrieval_text: FK на competition
      metric_id:
        retrieval_text: FK на metric
      task_type_id:
        retrieval_text: FK на task_type
      daily_attempt_limit:
        retrieval_text: суточный лимит отправок

    examples:
      - query: Лимиты отправок по соревнованиям
        answer: >
          SELECT c.title, cfg.daily_attempt_limit
          FROM configuration cfg
          JOIN competition c ON c.competition_id = cfg.competition_id
          ORDER BY cfg.daily_attempt_limit ASC;

  dataset_purpose:
    retrieval_text: >
      Справочник назначения датасета (train, test, validation, private/public и т.п.).

    context_text: "dataset_purpose(purpose_id SERIAL PK, name VARCHAR(15) UNIQUE, description TEXT)"

    columns:
      purpose_id:
        retrieval_text: идентификатор назначения датасета
      name:
        retrieval_text: код назначения
      description:
        retrieval_text: описание назначения

    examples:
      - query: Список назначений датасетов
        answer: >
          SELECT purpose_id, name
          FROM dataset_purpose
          ORDER BY purpose_id;

  dataset:
    retrieval_text: >
      Наборы данных платформы.
      Хранит назначение, имя, признак скрытости, версию.
      Соревнование связывается через competition_dataset.

    context_text: "dataset(dataset_id BIGINT PK, purpose_id BIGINT FK→dataset_purpose, name VARCHAR(30), is_hidden BOOLEAN, version SMALLINT)"

    columns:
      dataset_id:
        retrieval_text: идентификатор датасета
      purpose_id:
        retrieval_text: FK на dataset_purpose
      name:
        retrieval_text: имя датасета
      is_hidden:
        retrieval_text: скрыт ли датасет
      version:
        retrieval_text: версия датасета

    examples:
      - query: Скрытые датасеты
        answer: >
          SELECT dataset_id, name, version
          FROM dataset
          WHERE is_hidden = TRUE
          ORDER BY dataset_id;

      - query: Количество датасетов в каждом соревновании
        answer: >
          SELECT c.competition_id, c.title, COUNT(cd.dataset_id) AS datasets_count
          FROM competition c
          LEFT JOIN competition_dataset cd ON cd.competition_id = c.competition_id
          GROUP BY c.competition_id, c.title
          ORDER BY datasets_count DESC;

  dataset_file:
    retrieval_text: >
      Файлы датасетов хранящиеся в storage.
      Содержит имя файла, путь, размер и контрольную сумму.
      Это актуальная таблица хранения файлов датасетов.

    context_text: "dataset_file(file_id BIGINT PK, dataset_id BIGINT FK→dataset, filename VARCHAR(50), storage_path TEXT, size_bytes BIGINT, checksum VARCHAR(64) NULL)"

    columns:
      file_id:
        retrieval_text: идентификатор файла
      dataset_id:
        retrieval_text: FK на dataset
      filename:
        retrieval_text: имя файла
      storage_path:
        retrieval_text: путь хранения файла
      size_bytes:
        retrieval_text: размер файла в байтах
      checksum:
        retrieval_text: контрольная сумма

    examples:
      - query: Топ 20 самых больших файлов
        answer: >
          SELECT file_id, filename, size_bytes
          FROM dataset_file
          ORDER BY size_bytes DESC
          LIMIT 20;

  team_status:
    retrieval_text: >
      Справочник статусов команды.

    context_text: "team_status(status_id SERIAL PK, name VARCHAR(15) UNIQUE, description TEXT)"

    columns:
      status_id:
        retrieval_text: идентификатор статуса команды
      name:
        retrieval_text: код статуса команды
      description:
        retrieval_text: описание статуса

    examples:
      - query: Статусы команд
        answer: >
          SELECT status_id, name
          FROM team_status
          ORDER BY status_id;

  team:
    retrieval_text: >
      Команды участников в соревнованиях.

    context_text: "team(team_id BIGINT PK, competition_id BIGINT FK→competition, status_id BIGINT FK→team_status, name VARCHAR(30), created_at TIMESTAMP)"

    columns:
      team_id:
        retrieval_text: идентификатор команды
      competition_id:
        retrieval_text: FK на competition
      status_id:
        retrieval_text: FK на team_status
      name:
        retrieval_text: название команды
      created_at:
        retrieval_text: время создания команды

    examples:
      - query: Команды и количество участников
        answer: >
          SELECT t.team_id, t.name, COUNT(tm.member_id) AS members_count
          FROM team t
          LEFT JOIN team_member tm ON tm.team_id = t.team_id
          GROUP BY t.team_id, t.name
          ORDER BY members_count DESC;

  team_role:
    retrieval_text: >
      Справочник ролей в команде.

    context_text: "team_role(team_role_id SERIAL PK, name VARCHAR(15) UNIQUE, description TEXT)"

    columns:
      team_role_id:
        retrieval_text: идентификатор роли в команде
      name:
        retrieval_text: код роли
      description:
        retrieval_text: описание роли

    examples:
      - query: Роли участников команды
        answer: >
          SELECT team_role_id, name
          FROM team_role
          ORDER BY team_role_id;

  participation_status:
    retrieval_text: >
      Справочник статусов участия в соревновании.

    context_text: "participation_status(status_id SERIAL PK, name VARCHAR(15) UNIQUE, description TEXT)"

    columns:
      status_id:
        retrieval_text: идентификатор статуса участия
      name:
        retrieval_text: код статуса
      description:
        retrieval_text: описание статуса

    examples:
      - query: Статусы участия
        answer: >
          SELECT status_id, name
          FROM participation_status
          ORDER BY status_id;

  participation:
    retrieval_text: >
      Участие пользователя в соревновании.
      В актуальной DDL хранит агрегированную аналитику best_score и rank.
      Рейтинг и лучший результат участника хранятся прямо в participation.

    context_text: "participation(participation_id BIGINT PK, user_id BIGINT FK→user, competition_id BIGINT FK→competition, status_id BIGINT FK→participation_status, team_id BIGINT FK→team NULL, best_score NUMERIC(12,6) NULL, rank SMALLINT NULL, registered_at TIMESTAMP)"

    columns:
      participation_id:
        retrieval_text: идентификатор участия
      user_id:
        retrieval_text: FK на user
      competition_id:
        retrieval_text: FK на competition
      status_id:
        retrieval_text: FK на participation_status
      team_id:
        retrieval_text: FK на team, может быть NULL
      best_score:
        retrieval_text: лучший результат участника
      rank:
        retrieval_text: место участника
      registered_at:
        retrieval_text: дата регистрации участия

    examples:
      - query: Топ 10 участников по best_score в активных соревнованиях
        answer: >
          SELECT c.title, p.participation_id, p.best_score, p.rank
          FROM participation p
          JOIN competition c ON c.competition_id = p.competition_id
          WHERE c.status_id = (SELECT status_id FROM competition_status WHERE name = 'active')
            AND p.best_score IS NOT NULL
          ORDER BY p.best_score DESC
          LIMIT 10;

  submission_status:
    retrieval_text: >
      Справочник статусов отправки решения.

    context_text: "submission_status(status_id SERIAL PK, name VARCHAR(15) UNIQUE, description TEXT)"

    columns:
      status_id:
        retrieval_text: идентификатор статуса отправки
      name:
        retrieval_text: код статуса отправки
      description:
        retrieval_text: описание статуса отправки

    examples:
      - query: Статусы сабмитов
        answer: >
          SELECT status_id, name
          FROM submission_status
          ORDER BY status_id;

  submission:
    retrieval_text: >
      Отправки решений участников.
      В актуальной DDL внутри submission хранятся и оценка (metric_value, is_valid, error_log),
      и данные кода решения (source_code, language, solution_description).
      Оценка и данные кода решения хранятся прямо в submission.

    context_text: "submission(submission_id BIGINT PK, participation_id BIGINT FK→participation, status_id BIGINT FK→submission_status, file_path TEXT, attempt_number SMALLINT, metric_value NUMERIC(12,6) NULL, is_valid BOOLEAN, error_log TEXT NULL, source_code TEXT NULL, language VARCHAR(30) NULL, solution_description TEXT NULL, submitted_at TIMESTAMP)"

    columns:
      submission_id:
        retrieval_text: идентификатор отправки
      participation_id:
        retrieval_text: FK на participation
      status_id:
        retrieval_text: FK на submission_status
      file_path:
        retrieval_text: путь к отправленному файлу
      attempt_number:
        retrieval_text: номер попытки
      metric_value:
        retrieval_text: оценка метрики
      is_valid:
        retrieval_text: валиден ли сабмит
      error_log:
        retrieval_text: лог ошибок валидации/оценки
      source_code:
        retrieval_text: исходный код решения
      language:
        retrieval_text: язык программирования решения
      solution_description:
        retrieval_text: текстовое описание решения
      submitted_at:
        retrieval_text: дата и время отправки

    examples:
      - query: Количество валидных сабмитов по соревнованиям
        answer: >
          SELECT p.competition_id, COUNT(*) AS valid_submissions
          FROM submission s
          JOIN participation p ON p.participation_id = s.participation_id
          WHERE s.is_valid = TRUE
          GROUP BY p.competition_id
          ORDER BY valid_submissions DESC;

      - query: Участники превысившие дневной лимит отправок
        answer: >
          SELECT u.username, DATE(s.submitted_at) AS day, COUNT(s.submission_id) AS daily_count
          FROM "user" u
          JOIN participation p ON p.user_id = u.user_id
          JOIN submission s ON s.participation_id = p.participation_id
          JOIN configuration cfg ON cfg.competition_id = p.competition_id
          GROUP BY u.username, DATE(s.submitted_at), cfg.daily_attempt_limit
          HAVING COUNT(s.submission_id) > cfg.daily_attempt_limit;

  team_member:
    retrieval_text: >
      Участники команд и их роли.

    context_text: "team_member(member_id BIGINT PK, team_id BIGINT FK→team, user_id BIGINT FK→user, team_role_id BIGINT FK→team_role, joined_at TIMESTAMP)"

    columns:
      member_id:
        retrieval_text: идентификатор записи участника команды
      team_id:
        retrieval_text: FK на team
      user_id:
        retrieval_text: FK на user
      team_role_id:
        retrieval_text: FK на team_role
      joined_at:
        retrieval_text: дата вступления в команду

    examples:
      - query: Участники команд с ролями
        answer: >
          SELECT tm.team_id, u.username, tr.name AS team_role
          FROM team_member tm
          JOIN "user" u ON u.user_id = tm.user_id
          JOIN team_role tr ON tr.team_role_id = tm.team_role_id
          ORDER BY tm.team_id;

  competition_dataset:
    retrieval_text: >
      Связующая таблица соревнования и датасета (M:N).

    context_text: "competition_dataset(competition_id BIGINT PK FK→competition, dataset_id BIGINT PK FK→dataset, added_at TIMESTAMP)"

    columns:
      competition_id:
        retrieval_text: FK на competition
      dataset_id:
        retrieval_text: FK на dataset
      added_at:
        retrieval_text: дата привязки датасета к соревнованию

    examples:
      - query: Сколько датасетов у каждого соревнования
        answer: >
          SELECT competition_id, COUNT(*) AS datasets_count
          FROM competition_dataset
          GROUP BY competition_id
          ORDER BY datasets_count DESC;

  team_competition:
    retrieval_text: >
      Связующая таблица команда-датасет (M:N).

    context_text: "team_competition(team_id BIGINT PK FK→team, dataset_id BIGINT PK FK→dataset, added_at TIMESTAMP)"

    columns:
      team_id:
        retrieval_text: FK на team
      dataset_id:
        retrieval_text: FK на dataset
      added_at:
        retrieval_text: дата привязки датасета к команде

    examples:
      - query: Количество датасетов у каждой команды
        answer: >
          SELECT team_id, COUNT(*) AS datasets_count
          FROM team_competition
          GROUP BY team_id
          ORDER BY datasets_count DESC;
