version: 4


algorithms:
  max_path_length: 5               # max hops allowed in a join chain

  node_type_costs:
    relationship:           0.4    # participation — cheap central hub
    event:                  0.8    # competition
    entity:                 0.8    # user
    ontology:               0.6    # task_type — cheap lookup
    metric_node:            0.8
    config:                 1.0    # competition_config
    reward:                 1.4    # prize — avoid unless queried
    data_asset:             1.0    # dataset
    artifact:               1.6    # file_artifact — leaf
    process_event:          1.2    # submission — fan-out risk, slightly more expensive
    evaluation:             1.0
    ranking:                0.8    # leaderboard_row — preferred over evaluation for aggregation
    computational_artifact: 1.6    # code_kernel — leaf

# ---------------------------------------------------------------------------
# Tables — structural graph metadata only.
# Each table: node_type, hub_score (1=central), pk, directed edges with FK.
# hub_score >= 5 = leaf node (no FK expansion).
# ---------------------------------------------------------------------------
tables:

  user:
    node_type: entity
    hub_score: 2
    pk: user_id

    edges:
      - to: competition
        from_col: user_id
        to_col: organizer_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: participation
        from_col: user_id
        to_col: user_id
        cardinality: one_to_many
        join_preference: JOIN


  task_type:
    node_type: ontology
    hub_score: 2
    pk: task_type_id

    edges:
      - to: metric
        from_col: task_type_id
        to_col: task_type_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: competition
        from_col: task_type_id
        to_col: task_type_id
        cardinality: one_to_many
        join_preference: JOIN


  metric:
    node_type: metric_node
    hub_score: 3
    pk: metric_id

    edges:
      - to: task_type
        from_col: task_type_id
        to_col: task_type_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition_config
        from_col: metric_id
        to_col: metric_id
        cardinality: one_to_many
        join_preference: JOIN


  competition:
    node_type: event
    hub_score: 1
    pk: competition_id

    edges:
      - to: user
        from_col: organizer_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: task_type
        from_col: task_type_id
        to_col: task_type_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition_config
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_one
        join_preference: JOIN

      - to: prize
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: LEFT JOIN

      - to: participation
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: dataset
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN


  competition_config:
    node_type: config
    hub_score: 3
    pk: config_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: metric
        from_col: metric_id
        to_col: metric_id
        cardinality: many_to_one
        join_preference: JOIN


  prize:
    node_type: reward
    hub_score: 5
    pk: prize_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN


  participation:
    node_type: relationship
    hub_score: 1
    pk: participation_id

    edges:
      - to: user
        from_col: user_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: submission
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: leaderboard_row
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_one
        join_preference: LEFT JOIN

      - to: code_kernel
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_many
        join_preference: LEFT JOIN


  dataset:
    node_type: data_asset
    hub_score: 3
    pk: dataset_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: file_artifact
        from_col: dataset_id
        to_col: dataset_id
        cardinality: one_to_many
        join_preference: JOIN


  file_artifact:
    node_type: artifact
    hub_score: 5
    pk: file_id

    edges:
      - to: dataset
        from_col: dataset_id
        to_col: dataset_id
        cardinality: many_to_one
        join_preference: JOIN


  submission:
    node_type: process_event
    hub_score: 2
    pk: submission_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: evaluation
        from_col: submission_id
        to_col: submission_id
        cardinality: one_to_one
        join_preference: LEFT JOIN


  evaluation:
    node_type: evaluation
    hub_score: 3
    pk: evaluation_id

    edges:
      - to: submission
        from_col: submission_id
        to_col: submission_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: leaderboard_row
        from_col: evaluation_id
        to_col: best_evaluation_id
        cardinality: one_to_one
        join_preference: LEFT JOIN


  leaderboard_row:
    node_type: ranking
    hub_score: 3
    pk: participation_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: evaluation
        from_col: best_evaluation_id
        to_col: evaluation_id
        cardinality: many_to_one
        join_preference: JOIN


  code_kernel:
    node_type: computational_artifact
    hub_score: 5
    pk: kernel_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN
