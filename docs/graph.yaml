version: 4


algorithms:
  path_finding: steiner_approx
  max_path_length: 5               # max hops allowed in a join chain
  max_paths_returned: 3            # keep top-N scored paths per pair


  node_type_costs:
    relationship:           0.4    # participation — cheap central hub
    event:                  0.8    # competition
    entity:                 0.8    # user
    ontology:               0.6    # task_type — cheap lookup
    metric_node:            0.8
    config:                 1.0    # competition_config
    reward:                 1.4    # prize — avoid unless queried
    data_asset:             1.0    # dataset
    artifact:               1.6    # file_artifact — leaf
    process_event:          1.0    # submission
    evaluation:             1.0
    ranking:                1.0
    computational_artifact: 1.6    # code_kernel — leaf

  intermediate_node_cost_limit: 1.2

# ---------------------------------------------------------------------------
# Tables — structural graph metadata only.
# Each table: node_type, hub_score (1=central), pk, directed edges with FK,
# cardinality, join_preference, filter hints, aggregation hints.
# ---------------------------------------------------------------------------
tables:

  user:
    node_type: entity
    hub_score: 2
    pk: user_id

    edges:
      - to: competition
        from_col: user_id
        to_col: organizer_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: participation
        from_col: user_id
        to_col: user_id
        cardinality: one_to_many
        join_preference: JOIN

    filter_hints:
      - col: username
        usage: equality
      - col: created_at
        usage: range
      - col: bio
        usage: null_check

    aggregation_hints:
      group_by: [user_id, username]
      count_distinct: [participation_id, competition_id]


  task_type:
    node_type: ontology
    hub_score: 2
    pk: task_type_id

    edges:
      - to: metric
        from_col: task_type_id
        to_col: task_type_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: competition
        from_col: task_type_id
        to_col: task_type_id
        cardinality: one_to_many
        join_preference: JOIN

    filter_hints:
      - col: code
        usage: equality           # WHERE t.code = 'classification'

    aggregation_hints:
      group_by: [task_type_id, code]


  metric:
    node_type: metric_node
    hub_score: 3
    pk: metric_id

    edges:
      - to: task_type
        from_col: task_type_id
        to_col: task_type_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition_config
        from_col: metric_id
        to_col: metric_id
        cardinality: one_to_many
        join_preference: JOIN

    filter_hints:
      - col: name
        usage: equality_ilike     # WHERE m.name ILIKE '%mse%'
      - col: optimization_direction
        usage: equality           # WHERE m.optimization_direction = 'minimize'

    aggregation_hints:
      group_by: [metric_id, name]
      aggregate_cols: []


  competition:
    node_type: event
    hub_score: 1
    pk: competition_id

    edges:
      - to: user
        from_col: organizer_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: task_type
        from_col: task_type_id
        to_col: task_type_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition_config
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_one
        join_preference: JOIN

      - to: prize
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: LEFT JOIN

      - to: participation
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: dataset
        from_col: competition_id
        to_col: competition_id
        cardinality: one_to_many
        join_preference: JOIN

    filter_hints:
      - col: status
        usage: equality           # WHERE c.status = 'active'
      - col: start_at
        usage: range
      - col: end_at
        usage: range
      - col: title
        usage: equality_ilike

    aggregation_hints:
      group_by: [competition_id, title]
      count_distinct: [participation_id]


  competition_config:
    node_type: config
    hub_score: 3
    pk: config_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: metric
        from_col: metric_id
        to_col: metric_id
        cardinality: many_to_one
        join_preference: JOIN

    filter_hints:
      - col: aggregation_rule
        usage: equality           # WHERE cc.aggregation_rule = 'best'
      - col: max_daily_submissions
        usage: comparison

    aggregation_hints:
      group_by: [config_id, competition_id]


  prize:
    node_type: reward
    hub_score: 5
    pk: prize_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

    filter_hints:
      - col: amount
        usage: comparison         # HAVING SUM(pr.amount) > ?
      - col: currency
        usage: equality

    aggregation_hints:
      group_by: [competition_id]
      aggregate_cols: [amount]


  participation:
    node_type: relationship
    hub_score: 1
    pk: participation_id

    edges:
      - to: user
        from_col: user_id
        to_col: user_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: submission
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_many
        join_preference: JOIN

      - to: leaderboard_row
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_one
        join_preference: LEFT JOIN

      - to: code_kernel
        from_col: participation_id
        to_col: participation_id
        cardinality: one_to_many
        join_preference: LEFT JOIN

    filter_hints:
      - col: status
        usage: equality
      - col: registered_at
        usage: range

    aggregation_hints:
      group_by: [participation_id, user_id, competition_id]
      count_distinct: [submission_id, kernel_id]


  dataset:
    node_type: data_asset
    hub_score: 3
    pk: dataset_id

    edges:
      - to: competition
        from_col: competition_id
        to_col: competition_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: file_artifact
        from_col: dataset_id
        to_col: dataset_id
        cardinality: one_to_many
        join_preference: JOIN

    filter_hints:
      - col: usage_type
        usage: equality           # WHERE d.usage_type = 'train'
      - col: is_hidden
        usage: equality
      - col: created_at
        usage: range

    aggregation_hints:
      group_by: [dataset_id, competition_id, usage_type]
      # file count pattern:
      # (SELECT COUNT(*) FROM file_artifact fa WHERE fa.dataset_id = d.dataset_id) >= N


  file_artifact:
    node_type: artifact
    hub_score: 5
    pk: file_id

    edges:
      - to: dataset
        from_col: dataset_id
        to_col: dataset_id
        cardinality: many_to_one
        join_preference: JOIN

    filter_hints:
      - col: filename
        usage: equality_ilike
      - col: size_bytes
        usage: comparison

    aggregation_hints:
      group_by: [dataset_id]
      aggregate_cols: [size_bytes, file_id]   # SUM(size_bytes), COUNT(file_id)


  submission:
    node_type: process_event
    hub_score: 2
    pk: submission_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: evaluation
        from_col: submission_id
        to_col: submission_id
        cardinality: one_to_one
        join_preference: LEFT JOIN

    filter_hints:
      - col: status
        usage: equality           # WHERE s.status = 'success'
      - col: submitted_at
        usage: range

    aggregation_hints:
      group_by: [participation_id]
      count_distinct: [submission_id]


  evaluation:
    node_type: evaluation
    hub_score: 3
    pk: evaluation_id

    edges:
      - to: submission
        from_col: submission_id
        to_col: submission_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: leaderboard_row
        from_col: evaluation_id
        to_col: best_evaluation_id
        cardinality: one_to_one
        join_preference: LEFT JOIN

    filter_hints: []

    aggregation_hints:
      group_by: []
      aggregate_cols: [metric_value]   # AVG, MAX, MIN, PERCENTILE_CONT


  leaderboard_row:
    node_type: ranking
    hub_score: 3
    pk: participation_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN

      - to: evaluation
        from_col: best_evaluation_id
        to_col: evaluation_id
        cardinality: many_to_one
        join_preference: JOIN

    filter_hints:
      - col: rank
        usage: comparison         # WHERE lr.rank <= 10
      - col: score
        usage: comparison

    aggregation_hints:
      group_by: [participation_id]
      aggregate_cols: [score, rank]


  code_kernel:
    node_type: computational_artifact
    hub_score: 5
    pk: kernel_id

    edges:
      - to: participation
        from_col: participation_id
        to_col: participation_id
        cardinality: many_to_one
        join_preference: JOIN

    filter_hints:
      - col: language
        usage: equality           # WHERE ck.language = 'Python'
      - col: created_at
        usage: range

    aggregation_hints:
      group_by: [participation_id, language]
      count_distinct: [kernel_id]
